services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: trading_ledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading_ledger"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: always

  ingest_agent:
    build: .
    command: python services/market_data_ingest/ingest.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  signal_agent:
    build: .
    command: python services/signal_agent/signal_agent.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  scout_agent:
    build: .
    command: python services/scout_agent/scout_agent.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  review_agent:
    build: .
    command: python services/review_agent/review_agent.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  judge_agent:
    build: .
    command: python services/judge_agent/judge_agent.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  ops_monitor:
    build: .
    command: python services/ops_monitor/ops_monitor.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - OPS_MONITOR_PORT=8080
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=trading_ledger
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=securepassword
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: always

  postgres_backup:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      - PGPASSWORD=securepassword
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=trading_ledger
      - POSTGRES_USER=trader
      - BACKUP_INTERVAL_SECONDS=21600
    volumes:
      - ./backups/postgres:/backups
    command: >
      sh -c '
        mkdir -p /backups &&
        while true; do
          ts=$$(date +%Y%m%d_%H%M%S);
          pg_dump -h $$POSTGRES_HOST -U $$POSTGRES_USER $$POSTGRES_DB > /backups/trading_ledger_$$ts.sql;
          find /backups -type f -name "*.sql" -mtime +7 -delete;
          sleep $$BACKUP_INTERVAL_SECONDS;
        done
      '
    depends_on:
      - postgres
    restart: always

  risk_agent:
    build: .
    command: python services/risk_agent/risk_agent.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=trading_ledger
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=securepassword
    depends_on:
      - redis
      - postgres
    restart: always

  execution_agent:
    build: .
    command: python services/execution_agent/execution_agent.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always
    
  ledger_agent:
    build: .
    command: python services/ledger_agent/ledger_agent.py
    environment:
      - REDIS_URL=redis://redis:6379
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=trading_ledger
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=securepassword
    depends_on:
      - redis
      - postgres
    restart: always
